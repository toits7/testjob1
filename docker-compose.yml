services:
  backend:
    build:
      dockerfile: backend/Dockerfile
    container_name: backend
    restart: always
    networks:
        - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_SERVER_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  proxy:
    build:
      dockerfile: proxy/Dockerfile
    environment:
      - HTTP_SERVER_PORT=8080
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app_network


networks:
  app_network:
    driver: bridge